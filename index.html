<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIT ANS Summer Strava Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Spline+Sans+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ============================================================
   MIT ANS SUMMER STRAVA CHALLENGE
   ============================================================
   >> TO UPDATE EACH WEEK: edit data.js (not this file).
   Everything else recomputes automatically.
   ============================================================ */

:root{
  --ink:#1a2438;
  --paper:#f4ead5;
  --paper-deep:#ebdcc0;
  --sea:#1d6a73;
  --sea-bright:#2a9d8f;
  --sun:#e9a13b;
  --coral:#e2603f;
  --plum:#6a4a7a;
  --line:rgba(26,36,56,.16);
  --gold:#c9962f;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Spline Sans Mono',monospace;
  background:var(--paper);
  color:var(--ink);
  line-height:1.5;
  overflow-x:hidden;
  background-image:radial-gradient(circle at 12% 8%,rgba(233,161,59,.10),transparent 42%),radial-gradient(circle at 88% 4%,rgba(29,106,115,.10),transparent 40%);
}

/* --- header --- */
.masthead{
  max-width:1080px;margin:0 auto;padding:34px 22px 0;
  text-align:center;position:relative;
}
.eyebrow{
  font-size:12px;letter-spacing:.42em;text-transform:uppercase;
  color:var(--sea);font-weight:600;
}
.wordmark{
  font-family:'Bricolage Grotesque',sans-serif;
  font-weight:800;line-height:.92;letter-spacing:-.02em;
  font-size:clamp(44px,10vw,104px);
  margin:6px 0 2px;
  background:linear-gradient(180deg,var(--ink),#2c3d5e);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.wordmark em{
  font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;
  -webkit-text-fill-color:var(--coral);display:inline-block;
}
.subtitle{
  font-family:'Instrument Serif',serif;font-style:italic;
  font-size:clamp(16px,2.4vw,22px);color:#5a5140;margin-bottom:22px;
}
.rule{
  height:3px;max-width:1080px;margin:0 auto;
  background:repeating-linear-gradient(90deg,var(--ink) 0 18px,transparent 18px 26px);
  opacity:.5;
}

/* --- week selector --- */
.control-bar{
  max-width:1080px;margin:22px auto 0;padding:0 22px;
  display:flex;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap;
}
.week-select{
  position:relative;
}
.week-select select{
  appearance:none;-webkit-appearance:none;
  font-family:'Bricolage Grotesque',sans-serif;font-weight:700;
  font-size:19px;color:var(--paper);
  background:var(--ink);border:none;border-radius:100px;
  padding:12px 52px 12px 26px;cursor:pointer;
  box-shadow:0 6px 0 #0d1626;transition:transform .12s,box-shadow .12s;
}
.week-select select:active{transform:translateY(4px);box-shadow:0 2px 0 #0d1626}
.week-select::after{
  content:"▾";position:absolute;right:22px;top:50%;transform:translateY(-50%);
  color:var(--sun);font-size:16px;pointer-events:none;
}
.week-note{
  font-size:12.5px;color:#7a6f58;font-style:italic;
  font-family:'Instrument Serif',serif;font-size:15px;
}

/* --- section wrap --- */
main{max-width:1080px;margin:0 auto;padding:8px 22px 80px}
.section-label{
  font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
  font-size:13px;letter-spacing:.24em;text-transform:uppercase;
  color:var(--sea);margin:40px 0 4px;display:flex;align-items:center;gap:12px;
}
.section-label::after{content:"";flex:1;height:2px;background:var(--line)}

/* --- champions row --- */
.champ-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:18px;
}
.champ{
  border:2.5px solid var(--ink);border-radius:16px;padding:18px 20px;
  background:var(--paper);position:relative;overflow:hidden;
  box-shadow:5px 5px 0 var(--ink);
}
.champ::before{
  content:"";position:absolute;inset:0;opacity:.14;pointer-events:none;
}
.champ.run::before{background:radial-gradient(circle at 100% 0,var(--coral),transparent 60%)}
.champ.time::before{background:radial-gradient(circle at 100% 0,var(--sea-bright),transparent 60%)}
.champ.wrun::before{background:radial-gradient(circle at 100% 0,var(--sun),transparent 60%)}
.champ.wtime::before{background:radial-gradient(circle at 100% 0,var(--plum),transparent 60%)}
.champ .cat{
  font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;color:#7a6f58;
}
.champ .who{
  font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
  font-size:23px;line-height:1.05;margin:8px 0 2px;letter-spacing:-.01em;
}
.champ .val{
  font-size:15px;font-weight:600;color:var(--sea);
}
.champ .val b{color:var(--ink);font-size:26px}
.champ .whn{
  font-family:'Instrument Serif',serif;font-style:italic;font-size:14px;color:#8a7f66;margin-top:3px;
}
.champ .medal{
  position:absolute;top:14px;right:16px;font-size:22px;
}

/* --- leaderboard tables --- */
.board{
  margin-top:16px;border:2.5px solid var(--ink);border-radius:16px;overflow:hidden;
  box-shadow:5px 5px 0 var(--ink);background:var(--paper);
}
.board-head{
  display:grid;grid-template-columns:44px 1fr auto;gap:10px;
  padding:12px 18px;background:var(--ink);color:var(--paper);
  font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:12px;
  letter-spacing:.12em;text-transform:uppercase;align-items:center;
}
.board-head .r-val{text-align:right}
.row{
  display:grid;grid-template-columns:44px 1fr auto;gap:10px;align-items:center;
  padding:13px 18px;border-top:1.5px solid var(--line);
  transition:background .15s;
}
.row:nth-child(even){background:rgba(26,36,56,.03)}
.row:hover{background:rgba(233,161,59,.14)}
.row .rank{
  font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:18px;color:#a89b7f;
}
.row.top1 .rank{color:var(--gold)}
.row.top2 .rank{color:#9a9a9a}
.row.top3 .rank{color:#b3763e}
.row .nm{font-weight:500;font-size:15.5px}
.row .nm .badges{margin-left:8px;font-size:12px;letter-spacing:.05em;color:#9a8f74}
.row .r-val{
  text-align:right;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:17px;
}
.row .r-val small{font-size:11px;color:#8a7f66;font-weight:400;margin-left:2px}
.top1 .r-val{color:var(--coral)}

/* records view: 4-col layout with a Week column */
.board-head.rec,.row.rec{grid-template-columns:44px 1fr auto auto;gap:12px}
.row.rec .wk{
  font-family:'Spline Sans Mono',monospace;font-size:12.5px;font-weight:500;
  color:var(--sea);background:rgba(29,106,115,.10);
  padding:3px 10px;border-radius:100px;white-space:nowrap;justify-self:end;
}
.board-head.rec .wk-h{text-align:right}

/* toggle for board metric on weekly view */
.board-tabs{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.board-tabs button{
  font-family:'Spline Sans Mono',monospace;font-size:13px;font-weight:500;
  border:2px solid var(--ink);background:var(--paper);color:var(--ink);
  padding:7px 16px;border-radius:100px;cursor:pointer;transition:all .12s;
}
.board-tabs button.on{background:var(--ink);color:var(--paper)}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:4px}
@media(max-width:760px){
  .two-col{grid-template-columns:1fr}
  .champ .who{font-size:20px}
}
.col-title{
  font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:16px;
  margin:24px 0 0;display:flex;align-items:center;gap:8px;
}
.col-title .ic{font-size:18px}

.foot{
  text-align:center;padding:30px 22px;color:#8a7f66;font-size:12px;
  font-family:'Instrument Serif',serif;font-style:italic;font-size:15px;
}
.pill{
  display:inline-block;background:var(--sun);color:var(--ink);
  font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:11px;
  padding:3px 10px;border-radius:100px;letter-spacing:.08em;text-transform:uppercase;
  vertical-align:middle;
}
.empty{padding:26px 18px;text-align:center;color:#8a7f66;font-style:italic;font-family:'Instrument Serif',serif;font-size:16px}
</style>
</head>
<body>

<header class="masthead">
  <div class="eyebrow">MIT ANS · Run · Swim · Cycle · Row</div>
  <h1 class="wordmark">Summer <em>Strava</em><br>Challenge</h1>
  <p class="subtitle">Brought to you by the American Nuclear Society</p>
</header>
<div class="rule"></div>

<div class="control-bar">
  <div class="week-select">
    <select id="weekPick" onchange="render()"></select>
  </div>
  <span class="week-note" id="weekNote"></span>
</div>

<main>
  <div id="champs"></div>
  <div id="boards"></div>
</main>

<div class="foot">
  MIT ANS Summer Strava Challenge
</div>

<script src="data.js"></script>
<script>
// app logic below; WEEKS comes from data.js (loaded separately)


// ---- helpers ----
const fmtMi = v => (v||0).toFixed(1);
function fmtT(sec){
  sec=Math.round(sec||0);
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60);
  return h+"h"+String(m).padStart(2,"0")+"m";
}
const realWeeks = () => WEEKS.filter(w=>!w.example);

// aggregate a list of week objects into per-athlete totals
function aggregate(weeks){
  const map={};
  weeks.forEach(w=>w.athletes.forEach(a=>{
    if(!map[a.name]) map[a.name]={name:a.name,run_mi:0,swim_mi:0,cycle_mi:0,row_mi:0,time_sec:0};
    const m=map[a.name];
    m.run_mi+=a.run_mi||0; m.swim_mi+=a.swim_mi||0; m.cycle_mi+=a.cycle_mi||0;
    m.row_mi+=a.row_mi||0; m.time_sec+=a.time_sec||0;
  }));
  return Object.values(map);
}

// all-athlete single-week record across real weeks
function weekRecord(metricFn){
  let best=null;
  realWeeks().forEach(w=>{
    w.athletes.forEach(a=>{
      const v=metricFn(a);
      if(v>0 && (!best||v>best.v)) best={name:a.name,v,week:w.label};
    });
  });
  return best;
}

// flatten every athlete-week into individual performances, ranked by a metric.
// each entry: {name, val, week}
function bestWeeks(metricFn){
  const out=[];
  realWeeks().forEach(w=>{
    w.athletes.forEach(a=>{
      const v=metricFn(a);
      if(v>0) out.push({name:a.name, val:v, week:w.label});
    });
  });
  return out.sort((a,b)=>b.val-a.val);
}

// row renderer WITH a week column (for the single-week-record view)
function recordRows(list, fmt, unit){
  if(!list.length) return `<div class="empty">No data yet</div>`;
  return list.map((e,i)=>{
    const cls = i===0?"top1":i===1?"top2":i===2?"top3":"";
    return `<div class="row rec ${cls}">
      <span class="rank">${i+1}</span>
      <span class="nm">${e.name}</span>
      <span class="wk">${e.week}</span>
      <span class="r-val">${fmt(e.val)}<small>${unit}</small></span>
    </div>`;
  }).join("");
}

function champCard(cls,cat,medal,name,valHtml,when){
  if(!name) return `<div class="champ ${cls}"><div class="cat">${cat}</div><div class="empty" style="padding:10px 0">Awaiting the first real week</div></div>`;
  return `<div class="champ ${cls}"><span class="medal">${medal}</span>
    <div class="cat">${cat}</div>
    <div class="who">${name}</div>
    <div class="val">${valHtml}</div>
    ${when?`<div class="whn">${when}</div>`:""}</div>`;
}

function boardRows(list, valFn, unit){
  if(!list.length) return `<div class="empty">No data yet</div>`;
  return list.map((a,i)=>{
    const cls = i===0?"top1":i===1?"top2":i===2?"top3":"";
    return `<div class="row ${cls}">
      <span class="rank">${i+1}</span>
      <span class="nm">${a.name}</span>
      <span class="r-val">${valFn(a)}<small>${unit}</small></span>
    </div>`;
  }).join("");
}

function render(){
  const pick=document.getElementById("weekPick").value;
  const champs=document.getElementById("champs");
  const boards=document.getElementById("boards");
  const note=document.getElementById("weekNote");

  if(pick==="total"){
    if(!realWeeks().length){
      note.innerHTML=`The summer hasn't started yet`;
      champs.innerHTML=`
        <div class="section-label">Summer Champions</div>
        <div class="board" style="margin-top:18px">
          <div class="empty" style="padding:38px 24px;line-height:1.7">
            <div style="font-size:34px;margin-bottom:8px">🏁</div>
            The starting gun hasn't fired. Once Week 1's numbers are in,<br>
            summer totals and record-holders appear here.<br><br>
            <span style="font-size:14px">Meanwhile, pick <b>Week 0 (example)</b> from the menu<br>to see how the standings will look.</span>
          </div>
        </div>`;
      boards.innerHTML="";
      return;
    }
    note.innerHTML = `Cumulative across ${realWeeks().length} week${realWeeks().length>1?"s":""} · Week 0 excluded`;

    const agg=aggregate(realWeeks());
    const runBoard=[...agg].filter(a=>a.run_mi>0).sort((a,b)=>b.run_mi-a.run_mi);
    const timeBoard=[...agg].filter(a=>a.time_sec>0).sort((a,b)=>b.time_sec-a.time_sec);

    const runLeader=runBoard[0], timeLeader=timeBoard[0];

    champs.innerHTML=`
      <div class="section-label">Summer Champions</div>
      <div class="champ-grid">
        ${champCard("run","Most Distance Run · total","🏃",runLeader?runLeader.name:null,runLeader?`<b>${fmtMi(runLeader.run_mi)}</b> mi`:"", "")}
        ${champCard("time","Most Time · total","⏱️",timeLeader?timeLeader.name:null,timeLeader?`<b>${fmtT(timeLeader.time_sec)}</b>`:"", "run·swim·cycle·row")}
      </div>`;

    boards.innerHTML=`
      <div class="section-label">Full Standings</div>
      <div class="two-col">
        <div>
          <div class="col-title"><span class="ic">🏃</span> Distance Run — total</div>
          <div class="board">
            <div class="board-head"><span>#</span><span>Athlete</span><span class="r-val">Miles</span></div>
            ${boardRows(runBoard,a=>fmtMi(a.run_mi),"mi")}
          </div>
        </div>
        <div>
          <div class="col-title"><span class="ic">⏱️</span> Time — total (all sports)</div>
          <div class="board">
            <div class="board-head"><span>#</span><span>Athlete</span><span class="r-val">Time</span></div>
            ${boardRows(timeBoard,a=>fmtT(a.time_sec),"")}
          </div>
        </div>
      </div>`;
  } else if(pick==="records"){
    // Most in a single week — all-athlete records, with Week column
    if(!realWeeks().length){
      note.innerHTML=`The summer hasn't started yet`;
      champs.innerHTML=`
        <div class="section-label">Biggest Single Weeks</div>
        <div class="board" style="margin-top:18px">
          <div class="empty" style="padding:38px 24px;line-height:1.7">
            <div style="font-size:34px;margin-bottom:8px">📅</div>
            Single-week records appear once real weeks are in.<br>
            <span style="font-size:14px">Pick <b>Week 0 (example)</b> to preview the layout.</span>
          </div>
        </div>`;
      boards.innerHTML="";
      return;
    }
    note.innerHTML=`Best single week by any athlete · Week 0 excluded`;

    const runWeeks=bestWeeks(a=>a.run_mi);
    const timeWeeks=bestWeeks(a=>a.time_sec);
    const runTop=runWeeks[0], timeTop=timeWeeks[0];

    champs.innerHTML=`
      <div class="section-label">Record Holders</div>
      <div class="champ-grid">
        ${champCard("wrun","Biggest Week · distance","🏅",runTop?runTop.name:null,runTop?`<b>${fmtMi(runTop.val)}</b> mi`:"", runTop?runTop.week:"")}
        ${champCard("wtime","Biggest Week · time","🏅",timeTop?timeTop.name:null,timeTop?`<b>${fmtT(timeTop.val)}</b>`:"", timeTop?timeTop.week:"")}
      </div>`;

    boards.innerHTML=`
      <div class="section-label">Top Single-Week Performances</div>
      <div class="two-col">
        <div>
          <div class="col-title"><span class="ic">🏃</span> Distance Run — best weeks</div>
          <div class="board">
            <div class="board-head rec"><span>#</span><span>Athlete</span><span class="wk-h">Week</span><span class="r-val">Miles</span></div>
            ${recordRows(runWeeks,v=>fmtMi(v),"mi")}
          </div>
        </div>
        <div>
          <div class="col-title"><span class="ic">⏱️</span> Time — best weeks</div>
          <div class="board">
            <div class="board-head rec"><span>#</span><span>Athlete</span><span class="wk-h">Week</span><span class="r-val">Time</span></div>
            ${recordRows(timeWeeks,v=>fmtT(v),"")}
          </div>
        </div>
      </div>`;
  } else {
    // single week view
    const w=WEEKS[+pick];
    note.innerHTML = w.example
      ? `Example week · not counted in summer totals`
      : `Single-week view`;
    const runBoard=[...w.athletes].filter(a=>a.run_mi>0).sort((a,b)=>b.run_mi-a.run_mi);
    const timeBoard=[...w.athletes].filter(a=>a.time_sec>0).sort((a,b)=>b.time_sec-a.time_sec);

    champs.innerHTML=`
      <div class="section-label">${w.label} — Top Efforts ${w.example?'<span class="pill">example</span>':""}</div>
      <div class="champ-grid">
        ${champCard("run","Distance Run · this week","🏃",runBoard[0]?.name,runBoard[0]?`<b>${fmtMi(runBoard[0].run_mi)}</b> mi`:"", w.label)}
        ${champCard("time","Time · this week","⏱️",timeBoard[0]?.name,timeBoard[0]?`<b>${fmtT(timeBoard[0].time_sec)}</b>`:"", "all sports")}
      </div>`;

    boards.innerHTML=`
      <div class="section-label">${w.label} — Standings</div>
      <div class="two-col">
        <div>
          <div class="col-title"><span class="ic">🏃</span> Distance Run</div>
          <div class="board">
            <div class="board-head"><span>#</span><span>Athlete</span><span class="r-val">Miles</span></div>
            ${boardRows(runBoard,a=>fmtMi(a.run_mi),"mi")}
          </div>
        </div>
        <div>
          <div class="col-title"><span class="ic">⏱️</span> Time — all sports</div>
          <div class="board">
            <div class="board-head"><span>#</span><span>Athlete</span><span class="r-val">Time</span></div>
            ${boardRows(timeBoard,a=>fmtT(a.time_sec),"")}
          </div>
        </div>
      </div>`;
  }
}

// build dropdown
(function init(){
  const sel=document.getElementById("weekPick");
  const optTotal=document.createElement("option");
  optTotal.value="total"; optTotal.textContent="🏆 Summer Total";
  sel.appendChild(optTotal);
  const optRec=document.createElement("option");
  optRec.value="records"; optRec.textContent="📅 Biggest Single Week";
  sel.appendChild(optRec);
  WEEKS.forEach((w,i)=>{
    const o=document.createElement("option");
    o.value=String(i);
    o.textContent=w.label+(w.example?" (example)":"");
    sel.appendChild(o);
  });
  // default: if no real weeks yet, show the example week so the page
  // looks populated; otherwise open on Summer Total.
  sel.value = realWeeks().length ? "total" : "0";
  render();
})();
</script>
</body>
</html>
